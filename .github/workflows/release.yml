name: Release Artifact

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tarball
        run: |
          tar -czf hermes-course-generator.tar.gz bin/ templates/ skills/

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: "Automated release artifact from the main branch."
          draft: false
          prerelease: false
          files: hermes-course-generator.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
